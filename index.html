<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hei Maailma!!!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="scanlines"></div>

  <div class="container">

    <div class="glitch-wrapper">
      <h1 class="glitch" data-text="HEI MAAILMA">HEI MAAILMA</h1>
    </div>

    <p class="typewriter" id="typewriter"></p>

    <div class="card">
      <p>Tämä on ensimmäinen nettisivuni.</p>
      <p>Se on hyvin <span class="highlight">perus</span>.</p>
    </div>

    <div class="button-row">
      <button class="btn" id="clickBtn">KLIKKAA MINUA</button>
      <button class="btn btn-alt" id="colorBtn">⚡ VAIHDA VÄRIT</button>
    </div>

    <div class="counter-display" id="counterDisplay">
      <span class="counter-label">KLIKKAUKSIA:</span>
      <span class="counter-value" id="counterValue">0</span>
    </div>

    <div class="status-bar">
      <span id="statusText">// JÄRJESTELMÄ VALMIS</span>
      <span class="blink">▮</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
